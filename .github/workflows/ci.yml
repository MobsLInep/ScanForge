name: CI

# Runs on every PR and on pushes to main. Lint + unit tests + a release assemble (the release build
# falls back to debug signing when keystore.properties is absent, so it builds without secrets).
on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Android lint
        run: ./gradlew :app:lintDebug --console=plain --stacktrace

      - name: Unit tests (all modules)
        run: >
          ./gradlew
          :core:common:test
          :core:domain:test
          :core:datastore:testDebugUnitTest
          :core:data:testDebugUnitTest
          :core:imaging:testDebugUnitTest
          :core:ocr:testDebugUnitTest
          :core:export:testDebugUnitTest
          :app:testDebugUnitTest
          --console=plain --stacktrace

      - name: Assemble debug + release (R8)
        run: ./gradlew :app:assembleDebug :app:assembleRelease --console=plain --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  # Screenshot tests (Roborazzi) are stubbed for a follow-up: add the plugin + golden images, then
  # enable `./gradlew verifyRoborazziDebug` here. Kept separate so it can be made required later.
  screenshot-tests:
    runs-on: ubuntu-latest
    if: false # TODO(phase-9): enable once Roborazzi goldens are committed.
    steps:
      - run: echo "Roborazzi screenshot verification placeholder"
