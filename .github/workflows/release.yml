name: Release

# Publishes a GitHub Release with the signed APK whenever you push a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
#
# Signing: provide these repository secrets (Settings → Secrets and variables → Actions) so the APK
# is signed with your real release key. If they're absent the build still succeeds but falls back to
# debug signing (fine for sideload testing, NOT for Play / a stable upgrade key):
#   RELEASE_KEYSTORE_BASE64   base64 of your .jks      (base64 -w0 scanforge-release.jks)
#   RELEASE_STORE_PASSWORD    keystore password
#   RELEASE_KEY_ALIAS         key alias
#   RELEASE_KEY_PASSWORD      key password

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore (if configured)
        id: signing
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > scanforge-release.jks
            {
              echo "storeFile=scanforge-release.jks"
              echo "storePassword=$STORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } > keystore.properties
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Release keystore configured — APK will be release-signed."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No RELEASE_KEYSTORE_BASE64 secret — APK will fall back to debug signing."
          fi

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease --console=plain --stacktrace

      - name: Stage versioned APK
        run: |
          mkdir -p release-out
          cp app/build/outputs/apk/release/app-release.apk \
             "release-out/ScanForge-${{ github.ref_name }}.apk"

      - name: Verify APK signature
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --verbose "release-out/ScanForge-${{ github.ref_name }}.apk" || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ScanForge ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ScanForge ${{ github.ref_name }} — on-device OCR + PDF scanner.

            **Signed:** ${{ steps.signing.outputs.signed == 'true' && 'release key' || 'debug key (test build)' }}

            Download `ScanForge-${{ github.ref_name }}.apk` below and sideload it
            (enable "Install unknown apps" for your browser/file manager). minSdk 26.
          files: release-out/ScanForge-${{ github.ref_name }}.apk
